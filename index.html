<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Budget</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #16181d;
    --text: #e8eaed;
    --muted: #8a8f98;
    --green: #4ade80;
    --red: #f87171;
    --line: #24272e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  /* ---------- lock screen ---------- */
  #lock {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #lock h1 { font-size: 22px; font-weight: 600; letter-spacing: .5px; }
  #lock input {
    background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 12px 16px; border-radius: 10px;
    font-size: 16px; width: 260px; text-align: center; outline: none;
  }
  #lock input:focus { border-color: var(--green); }
  #lock button {
    background: var(--green); color: #0a0a0a; border: none;
    padding: 11px 28px; border-radius: 10px; font-size: 15px;
    font-weight: 600; cursor: pointer;
  }
  #lockErr { color: var(--red); font-size: 13px; height: 16px; }

  /* ---------- main layout ---------- */
  #app {
    display: none;
    height: 100vh;
    padding: 28px;
    gap: 36px;
  }
  #app.open { display: flex; }

  #left {
    flex: 0 0 320px;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 18px;
  }
  #balance {
    font-size: 76px; font-weight: 700;
    letter-spacing: -2px; line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--green);
    word-break: break-all;
  }
  #balance.neg { color: var(--red); }
  #sub { color: var(--muted); font-size: 14px; }

  #addForm { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
  #addForm input {
    background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 10px 12px; border-radius: 8px;
    font-size: 14px; outline: none; width: 100%;
  }
  #addForm input:focus { border-color: var(--green); }
  #addForm button {
    background: var(--green); color: #0a0a0a; border: none;
    padding: 10px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer;
  }
  #addForm button:active { transform: scale(.98); }

  #tools { display: flex; gap: 14px; margin-top: 6px; }
  #tools button {
    background: none; border: none; color: var(--muted);
    font-size: 12px; cursor: pointer; padding: 0;
  }
  #tools button:hover { color: var(--text); }

  /* ---------- expense columns ---------- */
  #cols {
    flex: 1;
    display: flex;
    gap: 20px;
    min-width: 0;
    padding-top: 4px;
  }
  .col {
    flex: 1;
    min-width: 0;
    display: flex; flex-direction: column;
  }
  .col.scroll { overflow-y: auto; padding-right: 4px; }
  .col.scroll::-webkit-scrollbar { width: 6px; }
  .col.scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    font-size: 14px;
    flex: 0 0 auto;
  }
  .row .desc {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .row .price {
    color: var(--red); font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .row .del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 13px; padding: 0 2px;
    opacity: 0; transition: opacity .12s;
  }
  .row:hover .del { opacity: 1; }
  .row .del:hover { color: var(--red); }
  .empty { color: var(--muted); font-size: 13px; padding: 8px 10px; }

  @media (max-width: 900px) {
    body { overflow: auto; }
    #app.open { flex-direction: column; height: auto; }
    #left { flex: none; }
    #balance { font-size: 56px; }
    #cols { flex-direction: column; }
    .col.scroll { overflow: visible; }
  }
</style>
</head>
<body>

<div id="lock">
  <h1>Daily Budget</h1>
  <input id="pw" type="password" placeholder="Password" autocomplete="current-password">
  <div id="lockErr"></div>
  <button id="unlock">Enter</button>
</div>

<div id="app">
  <div id="left">
    <div id="balance">$0.00</div>
    <div id="sub"></div>
    <form id="addForm">
      <input id="desc" type="text" placeholder="What did you buy?" required maxlength="80">
      <input id="price" type="number" placeholder="Price" step="0.01" min="0.01" required>
      <button type="submit">Add expense</button>
    </form>
    <div id="tools">
      <button id="exportBtn" type="button">Export backup</button>
      <button id="importBtn" type="button">Import backup</button>
      <button id="logoutBtn" type="button">Log out</button>
      <input id="importFile" type="file" accept=".json" hidden>
    </div>
  </div>
  <div id="cols">
    <div class="col" id="c0"></div>
    <div class="col" id="c1"></div>
    <div class="col" id="c2"></div>
    <div class="col scroll" id="c3"></div>
  </div>
</div>

<script>
const PW_HASH = '57179fb28d54fa91aa54df18c459187399306a706a7c19fd0cdc885260baa06a';
const AUTH_KEY = 'bt_auth';
const DATA_KEY = 'bt_expenses';
const START = new Date(2026, 5, 12); // June 12, 2026 (local time) — day 1
const DAILY = 25;
const ROWS_PER_COL = 15;

let expenses = JSON.parse(localStorage.getItem(DATA_KEY) || '[]');

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, '0')).join('');
}

// ---------- auth ----------
const lock = document.getElementById('lock');
const app = document.getElementById('app');

function openApp() {
  lock.style.display = 'none';
  app.classList.add('open');
  render();
}

async function tryUnlock() {
  const val = document.getElementById('pw').value;
  if (await sha256(val) === PW_HASH) {
    localStorage.setItem(AUTH_KEY, PW_HASH); // remember this device
    openApp();
  } else {
    document.getElementById('lockErr').textContent = 'Wrong password';
    document.getElementById('pw').value = '';
  }
}

document.getElementById('unlock').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem(AUTH_KEY);
  location.reload();
});

if (localStorage.getItem(AUTH_KEY) === PW_HASH) openApp();

// ---------- balance ----------
function daysSinceStart() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.max(1, Math.floor((today - START) / 86400000) + 1);
}

function updateBalance() {
  const earned = daysSinceStart() * DAILY;
  const spent = expenses.reduce((s, e) => s + e.price, 0);
  const bal = earned - spent;
  const el = document.getElementById('balance');
  el.textContent = (bal < 0 ? '-$' : '$') + Math.abs(bal).toFixed(2);
  el.classList.toggle('neg', bal < 0);
  document.getElementById('sub').textContent =
    `+$${DAILY}/day · day ${daysSinceStart()} · $${spent.toFixed(2)} spent`;
}

// ---------- expenses ----------
function save() {
  localStorage.setItem(DATA_KEY, JSON.stringify(expenses));
}

function rowEl(e) {
  const row = document.createElement('div');
  row.className = 'row';
  const desc = document.createElement('span');
  desc.className = 'desc';
  desc.textContent = e.desc;
  desc.title = e.desc + ' — ' + new Date(e.ts).toLocaleDateString();
  const price = document.createElement('span');
  price.className = 'price';
  price.textContent = '-$' + e.price.toFixed(2);
  const del = document.createElement('button');
  del.className = 'del';
  del.textContent = '✕';
  del.title = 'Delete';
  del.addEventListener('click', () => {
    expenses = expenses.filter(x => x.id !== e.id);
    save(); render();
  });
  row.append(desc, price, del);
  return row;
}

function render() {
  updateBalance();
  const sorted = [...expenses].sort((a, b) => b.ts - a.ts);
  const cols = [0, 1, 2, 3].map(i => document.getElementById('c' + i));
  cols.forEach(c => c.innerHTML = '');
  // first 3 columns hold 15 rows each (newest first), the 4th holds the rest and scrolls
  for (let i = 0; i < 3; i++) {
    sorted.slice(i * ROWS_PER_COL, (i + 1) * ROWS_PER_COL).forEach(e => cols[i].appendChild(rowEl(e)));
  }
  sorted.slice(3 * ROWS_PER_COL).forEach(e => cols[3].appendChild(rowEl(e)));
  if (sorted.length === 0) {
    cols[0].innerHTML = '<div class="empty">No expenses yet</div>';
  }
}

document.getElementById('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const desc = document.getElementById('desc').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  if (!desc || !(price > 0)) return;
  expenses.push({ id: Date.now() + Math.random().toString(36).slice(2), desc, price, ts: Date.now() });
  save(); render();
  e.target.reset();
  document.getElementById('desc').focus();
});

// ---------- backup ----------
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(expenses, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'budget-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
});
document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const data = JSON.parse(await file.text());
    if (!Array.isArray(data)) throw new Error('bad format');
    expenses = data.filter(x => x && typeof x.desc === 'string' && typeof x.price === 'number');
    save(); render();
  } catch {
    alert('Could not read that backup file.');
  }
  e.target.value = '';
});

// refresh balance at midnight without reloading
setInterval(updateBalance, 60000);
</script>
</body>
</html>
